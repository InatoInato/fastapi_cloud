name: Deploy FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            mkdir -p /home/ubuntu/apps
            cd /home/ubuntu/apps

            if [ ! -d fastapi_cloud ]; then
              git clone https://github.com/InatoInato/fastapi_cloud.git
            fi

            cd fastapi_cloud

            git fetch --all
            git reset --hard origin/main

            docker stop fastapi || true
            docker rm fastapi || true

            docker build -t fastapi .

            docker run -d \
              --name fastapi \
              --restart unless-stopped \
              -p 80:8000 \
              fastapi