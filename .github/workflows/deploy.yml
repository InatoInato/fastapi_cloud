name: Deploy FastAPI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt

            if [ ! -d fastapi_cloud ]; then
                git clone https://github.com/InatoInato/fastapi_cloud.git
            fi

            cd fastapi_cloud

            git fetch --all
            git reset --hard origin/main

            sudo docker stop fastapi || true
            sudo docker rm fastapi || true

            sudo docker build -t fastapi .

            sudo docker run -d \
                --name fastapi \
                --restart unless-stopped \
                -p 80:8000 \
                fastapi