name: Hello CI

on:
    push:
        branches:
            - main

jobs:
    hello:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Show current directory
              run: pwd

            - name: List files
              run: ls -la

            - name: Say hello
              run: echo "Hello from GitHub Actions"